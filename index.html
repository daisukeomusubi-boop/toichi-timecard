<title>toichi タイムカード</title>
<style>
html,body{margin:0;padding:0;height:100%;overflow:hidden;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
@keyframes slideIn{from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:translateX(0);}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,20px);}to{opacity:1;transform:translate(-50%,0);}}
@keyframes gridScroll{from{transform:translateY(0);}to{transform:translateY(40px);}}
@keyframes glowP{0%,100%{opacity:.25;}50%{opacity:.5;}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
button{font-family:inherit;cursor:pointer;}button:active{transform:scale(0.97);}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:#1e293b;border-radius:3px;}
.root{min-height:100vh;background:#0b1120;font-family:'Noto Sans JP','DM Sans','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;color:#94a3b8;position:relative;overflow:hidden;}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.035;background-image:linear-gradient(#334155 1px,transparent 1px),linear-gradient(90deg,#334155 1px,transparent 1px);background-size:40px 40px;animation:gridScroll 8s linear infinite;}

.h-left{display:flex;align-items:center;gap:14px;}.h-right{display:flex;align-items:center;gap:16px;}

.brand{color:#f1f5f9;font-weight:700;font-size:17px;letter-spacing:.5px;}.brand-sub{color:#475569;font-size:11px;margin-top:1px;}
.nav{display:flex;gap:4px;}.nav-btn{padding:8px 16px;border-radius:8px;border:1px solid transparent;background:transparent;color:#64748b;font-size:13px;font-weight:500;transition:all .2s;display:flex;align-items:center;gap:6px;}.nav-btn.active{background:#1e293b;color:#22d3ee;border-color:#0ea5e930;}

.clock-layout{position:relative;z-index:1;display:flex;height:calc(100vh - 65px);}
.left{width:340px;min-width:340px;height:100%;background:#0f172a;border-right:1px solid #1e293b;display:flex;flex-direction:column;overflow:hidden;}
.left-hd{padding:20px 20px 14px;border-bottom:1px solid #1e293b;}.left-t{color:#cbd5e1;font-size:14px;font-weight:600;}.left-s{color:#475569;font-size:11px;margin-top:4px;}
.st-tabs{display:flex;padding:8px 12px;border-bottom:1px solid #1e293b;flex-shrink:0;}.st-tab{flex:1;padding:8px 4px;border-radius:6px;border:none;background:transparent;color:#64748b;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;}.st-tab.active{background:#1e293b;color:#22d3ee;}
.st-list{flex:1;overflow-y:scroll;-webkit-overflow-scrolling:touch;padding:8px;min-height:0;}
.st-card{padding:14px 16px;border-radius:10px;background:#0b1120;border:1px solid #1e293b;margin-bottom:6px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px;animation:slideIn .25s ease;}.st-card:hover,.st-card.sel{border-color:#0ea5e950;background:#0ea5e908;}
.st-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;}
.st-nm{color:#e2e8f0;font-size:14px;font-weight:600;}.st-inf{color:#64748b;font-size:11px;margin-top:2px;}
.right{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;overflow-y:auto;}
.time-wrap{display:flex;align-items:baseline;gap:4px;margin-bottom:48px;}.big-t{font-size:96px;font-weight:300;letter-spacing:-2px;color:#f1f5f9;font-family:'DM Sans','Courier New',monospace;line-height:1;}.big-s{font-size:32px;font-weight:300;color:#475569;font-family:'Courier New',monospace;}

.stamps{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;width:100%;max-width:560px;}.stamp{text-align:center;padding:12px 8px;background:#0f172a;border-radius:10px;border:1px solid #1e293b;}.stamp-v{font-size:18px;font-weight:500;color:#e2e8f0;font-family:'Courier New',monospace;margin-bottom:4px;}.stamp-l{font-size:11px;color:#475569;}
.total{margin-top:20px;padding:12px 24px;border-radius:10px;background:#0ea5e910;border:1px solid #0ea5e930;color:#22d3ee;font-size:15px;}
.shifts-history{margin-top:16px;width:100%;max-width:560px;padding:12px 16px;background:#0f172a;border-radius:10px;border:1px solid #1e293b;}.shift-row{display:flex;align-items:center;gap:12px;padding:6px 0;font-size:13px;}.shift-row+.shift-row{border-top:1px solid #1e293b;}.shift-num{font-size:11px;color:#64748b;background:#1e293b;padding:2px 8px;border-radius:4px;font-weight:600;}

.cal-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:16px;}.cal-arrow{padding:8px 14px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#94a3b8;font-size:14px;transition:all .2s;}.cal-arrow:hover{color:#22d3ee;border-color:#0ea5e950;}.cal-month{font-size:18px;font-weight:700;color:#e2e8f0;min-width:140px;text-align:center;}.today-btn{padding:6px 14px;border-radius:8px;border:1px solid #0ea5e930;background:#0ea5e920;color:#22d3ee;font-size:12px;font-weight:600;margin-left:4px;}

.cal-salary{display:flex;gap:16px;justify-content:center;margin-bottom:16px;font-size:14px;flex-wrap:wrap;}.sal-card{background:#0f172a;border:1px solid #1e293b;border-radius:8px;padding:8px 16px;text-align:center;}.sal-v{font-size:18px;font-weight:700;color:#22d3ee;}.sal-l{font-size:11px;color:#64748b;margin-top:2px;}

.admin-layout{position:relative;z-index:1;padding:30px;overflow-y:auto;height:calc(100vh - 65px);}.admin-tabs{display:flex;gap:6px;margin-bottom:24px;flex-wrap:wrap;}.adm-tab{padding:10px 20px;border-radius:8px;border:1px solid #1e293b;background:#0f172a;color:#64748b;font-size:13px;font-weight:500;transition:all .2s;}.adm-tab.active{background:#0ea5e920;color:#22d3ee;border-color:#0ea5e940;}
.card{background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:20px;margin-bottom:16px;animation:fadeUp .3s ease;}.card-t{color:#e2e8f0;font-weight:700;font-size:15px;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.form-row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;align-items:flex-end;}.form-g{display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px;}.form-g label{font-size:11px;color:#64748b;font-weight:600;}
input[type=text],input[type=number],input[type=time],select{padding:10px 14px;border-radius:8px;border:1px solid #1e293b;background:#0b1120;color:#e2e8f0;font-size:14px;font-family:inherit;width:100%;transition:border-color .2s;}input:focus,select:focus{outline:none;border-color:#0ea5e9;}
.btn{padding:10px 20px;border-radius:8px;border:none;font-weight:600;font-size:13px;transition:all .2s;}.btn-p{background:linear-gradient(135deg,#0ea5e9,#06b6d4);color:#fff;box-shadow:0 4px 20px #0ea5e930;}.btn-p:hover{filter:brightness(1.1);}.btn-s{background:#1e293b;color:#94a3b8;border:1px solid #334155;}.btn-d{background:#dc2626;color:#fff;}
.tbl{width:100%;border-collapse:collapse;font-size:13px;}.tbl th{text-align:left;padding:10px 12px;color:#64748b;font-weight:600;border-bottom:1px solid #1e293b;}.tbl td{padding:10px 12px;border-bottom:1px solid #0f172a;color:#94a3b8;}.tbl tr:hover td{background:#1e293b20;}
.badge{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;}.badge-b{background:#0ea5e920;color:#22d3ee;}.badge-g{background:#22c55e20;color:#22c55e;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;animation:fadeUp .2s ease;}.modal{background:#1e293b;border-radius:16px;padding:28px;width:90%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.6);}.modal-lg{max-width:700px;max-height:85vh;overflow-y:auto;}
.modal-title{font-weight:700;font-size:16px;color:#e2e8f0;margin-bottom:20px;}.close-x{background:none;border:1px solid #334155;border-radius:8px;color:#64748b;padding:4px 10px;font-size:16px;cursor:pointer;}.close-x:hover{color:#f1f5f9;}
.modal-cancel{flex:1;padding:12px;border-radius:10px;border:1px solid #1e293b;background:#1e293b;color:#94a3b8;font-weight:600;}.modal-save{flex:1;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,#0ea5e9,#06b6d4);color:#fff;font-weight:700;box-shadow:0 4px 20px #0ea5e930;}.modal-save:hover{filter:brightness(1.1);}.modal-del{flex:1;padding:12px;border-radius:10px;border:none;background:#dc2626;color:#fff;font-weight:700;}
.pin-dot{width:48px;height:56px;border-radius:10px;background:#1e293b;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#e2e8f0;font-family:'Courier New',monospace;transition:all .15s;}.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:240px;margin:0 auto;}.pin-key{padding:14px 0;border-radius:10px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:20px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all .1s;}.pin-key:hover{background:#1e293b;}.pin-cancel{margin-top:16px;padding:8px 24px;border-radius:8px;border:1px solid #334155;background:transparent;color:#64748b;font-size:13px;cursor:pointer;}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);color:#fff;padding:14px 28px;border-radius:12px;font-size:14px;font-weight:600;z-index:999;display:flex;align-items:center;gap:10px;box-shadow:0 8px 30px rgba(0,0,0,.4);animation:toastIn .3s ease;}.toast-ok{background:linear-gradient(135deg,#0ea5e9,#06b6d4);}.toast-err{background:#dc2626;}.toast-ic{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}

/* ===== 新規追加: 管理画面の月次集計・カレンダー用スタイル ===== */
.cal-mode-tabs{display:flex;gap:6px;margin-bottom:20px;}.cal-mode{padding:10px 20px;border-radius:8px;border:1px solid #1e293b;background:#0b1120;color:#64748b;font-size:13px;font-weight:500;transition:all .2s;}.cal-mode.active{background:#0ea5e920;color:#22d3ee;border-color:#0ea5e940;}
.staff-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}.chip{padding:8px 16px;border-radius:20px;border:1px solid #1e293b;background:#0b1120;color:#94a3b8;font-size:12px;font-weight:500;transition:all .2s;}.chip.active{background:#0ea5e920;color:#22d3ee;border-color:#0ea5e940;}
.month-sel{padding:8px 14px;border-radius:8px;border:1px solid #1e293b;background:#0b1120;color:#e2e8f0;font-size:14px;font-family:inherit;}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:20px;}.summary-item{background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:12px;text-align:center;}.summary-val{font-size:20px;font-weight:700;color:#22d3ee;font-family:'Courier New',monospace;}.summary-lbl{font-size:11px;color:#64748b;margin-top:4px;}
.store-filter-row{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px;}.cal-grid-hd{text-align:center;font-size:12px;font-weight:600;padding:8px 4px;color:#64748b;}.cal-grid-hd.sun{color:#f87171;}.cal-grid-hd.sat{color:#60a5fa;}
.cal-cell{background:#0b1120;border:1px solid #1e293b;border-radius:8px;padding:8px 6px;min-height:64px;cursor:pointer;transition:all .2s;position:relative;}.cal-cell:hover{border-color:#0ea5e950;}.cal-cell.empty{background:transparent;border-color:transparent;cursor:default;}.cal-cell.empty:hover{border-color:transparent;}.cal-cell.today{border-color:#0ea5e960;}.cal-cell.cal-sel{border-color:#22d3ee;background:#0ea5e910;box-shadow:0 0 12px #0ea5e920;}.cal-cell.has .cal-dot{display:block;}
.cal-d{font-size:15px;font-weight:700;color:#e2e8f0;margin-bottom:2px;}.cal-d.sun{color:#f87171;}.cal-d.sat{color:#60a5fa;}.cal-d.holiday{color:#f87171;}
.cal-dot{display:none;width:5px;height:5px;border-radius:50%;background:#22c55e;position:absolute;top:6px;right:6px;}
.cal-cell-info{font-size:9px;color:#475569;line-height:1.3;margin-top:2px;overflow:hidden;}
.holiday-name{font-size:8px;color:#f87171;opacity:.7;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
</style>

<body>
<div id="root"></div>
<script>
// ═══════════════════════════════════════════════════════════════
// （株）toichi タイムカード v8 — クラウド版（管理画面拡張: 月次集計・カレンダー）
// ═══════════════════════════════════════════════════════════════
var GAS_URL = "https://script.google.com/macros/s/AKfycbwPcLeqrT4ecdYZckSCASbq-WdjxHQPeQ_w70cB4qEM4fIY-fvUUAqYXNljRIzyJoNqYw/exec";
var SYNC_INTERVAL = 60000;
var DEFAULT_STORES = ["橿原本店", "北堀江店", "心斎橋toichibowl"];
var ADMIN_PIN = "0910";
var SK = { staff: "toichi_s5", records: "toichi_r5", stores: "toichi_stores5" };
function load(k, fb) { try { var d = localStorage.getItem(k); return d ? JSON.parse(d) : fb; } catch(e) { return fb; } }
function save(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }

var state = {
  view: "clock", adminTab: "staff", sel: null, pin: "", showPin: false,
  staff: load(SK.staff, []), records: load(SK.records, []),
  stores: load(SK.stores, DEFAULT_STORES.slice()),
  storeFilter: "all", month: (function() { var d = new Date(); return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0"); })(),
  showCal: false, toast: null, toastTimer: null,
  newName: "", newStore: "", newType: "hour", newRate: "", newRateH: "", newTransport: "0",
  editStaff: null, confirmDel: null, editStoreIdx: null, editStoreName: "",
  newStoreName: "", editRec: null, confirmDelRec: null,
  editRecStaff: "", editRecDate: "",
  syncStatus: "idle",
  // 新規: 管理画面用
  adminMonth: (function() { var d = new Date(); return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0"); })(),
  adminStoreFilter: "all",
  calMode: "all", // "all" or "personal"
  calStaff: null,
  calDate: null // 全スタッフ日別で選択された日付
};

function saveAll() { save(SK.staff, state.staff); save(SK.records, state.records); save(SK.stores, state.stores); }

// ═══════════ API通信（CORS修正版） ═══════════
function updateSyncBadge() {
  var syncLabel = { idle: "", syncing: "同期中…", ok: "同期済", error: "同期エラー" };
  var syncClass = { idle: "sync-badge", syncing: "sync-badge sync-ing", ok: "sync-badge sync-ok", error: "sync-badge sync-err" };
  var badge = document.querySelector(".sync-badge");
  if (badge) {
    badge.className = syncClass[state.syncStatus] || "sync-badge";
    badge.textContent = syncLabel[state.syncStatus] || "";
    badge.style.display = state.syncStatus === "idle" ? "none" : "";
  }
}
function apiGet(action, callback) {
  state.syncStatus = "syncing"; updateSyncBadge();
  fetch(GAS_URL + "?action=" + action, { redirect: "follow" })
    .then(function(r) { return r.json(); })
    .then(function(data) { state.syncStatus = "ok"; if (callback) callback(data); })
    .catch(function(e) { console.warn("API GET error:", e); state.syncStatus = "error"; updateSyncBadge(); });
}
function apiPost(body, callback) {
  fetch(GAS_URL, { method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify(body), redirect: "follow" })
    .then(function(r) { return r.json(); })
    .then(function(data) { if (callback) callback(data); })
    .catch(function(e) { console.warn("API POST error:", e); });
}
function syncFromServer(showFlashMsg) {
  apiGet("getAll", function(data) {
    if (!data.ok) { state.syncStatus = "error"; updateSyncBadge(); return; }
    if (data.stores && data.stores.length > 0) state.stores = data.stores;
    if (data.staff) {
      state.staff = data.staff.map(function(s) {
        return { id: String(s.id), name: String(s.name), store: String(s.store), type: String(s.type), rate: Number(s.rate) || 0, rateH: Number(s.rateH) || 0, transport: Number(s.transport) || 0 };
      });
    }
    if (data.records) {
      state.records = data.records.map(function(r) {
        var dateStr = String(r.date);
        if (dateStr.indexOf("T") !== -1) { var d = new Date(dateStr); dateStr = d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0"); }
        function normalizeTime(v) {
          var s = String(v || ""); if (!s || s === "null" || s === "undefined" || s.length < 4) return null;
          // HH:MM形式ならそのまま
          if (/^\d{1,2}:\d{2}$/.test(s)) return s.length === 4 ? "0" + s : s;
          // ISO形式やDate文字列 → HH:MMに変換
          try { var d = new Date(s); if (!isNaN(d.getTime())) return String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0"); } catch(e) {}
          // HH:MM:SS等
          var m = s.match(/(\d{1,2}):(\d{2})/); if (m) return String(m[1]).padStart(2,"0") + ":" + m[2];
          return null;
        }
        return { staffId: String(r.staffId), date: dateStr, clockIn: normalizeTime(r.clockIn), clockOut: normalizeTime(r.clockOut), breakStart: normalizeTime(r.breakStart), breakEnd: normalizeTime(r.breakEnd), store: String(r.store || "") };
      });
    }
    saveAll();
    if (showFlashMsg) flash("サーバーと同期しました");
    render();
  });
}

// ═══════════ UTILS ═══════════
function now() { return new Date(); }
function toK(d) { return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0"); }
function fmt(v) { if (!v) return "--:--"; if (/^\d{1,2}:\d{2}/.test(v)) { var p = v.split(":"); return String(p[0]).padStart(2,"0") + ":" + p[1]; } var d = new Date(v); if (isNaN(d.getTime())) return "--:--"; return String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0"); }
function diffMin(a, b) { if (!a || !b) return 0; function toMin(v) { if (/^\d{1,2}:\d{2}/.test(v)) { var p = v.split(":"); return parseInt(p[0]) * 60 + parseInt(p[1]); } var d = new Date(v); return d.getHours() * 60 + d.getMinutes(); } return toMin(b) - toMin(a); }
function nowHHMM() { var d = now(); return String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0"); }
function flash(msg, type) { if (state.toastTimer) clearTimeout(state.toastTimer); state.toast = { msg: msg, type: type || "ok" }; render(); state.toastTimer = setTimeout(function() { state.toast = null; render(); }, 2500); }

function avColor(i) { return avColors[i % avColors.length]; }
function isWeekend(dateStr) { var d = new Date(dateStr); var day = d.getDay(); return day === 0 || day === 6; }
function hm(mins) { if (mins <= 0) return "0h00m"; return Math.floor(mins / 60) + "h" + String(mins % 60).padStart(2,"0") + "m"; }

// ═══════════ PUNCH ═══════════
function punch(sid, act) {
  var ts = nowHHMM();
  var todayK = toK(now());
  var sn = state.staff.find(function(x) { return x.id === sid; });
  var storeName = sn ? sn.store : "";
  var dayRecs = state.records.filter(function(r) { return r.staffId === sid && r.date === todayK; });
  var latest = dayRecs.length > 0 ? dayRecs[dayRecs.length - 1] : null;
  if (act === "clockIn") {
    if (latest && !latest.clockOut) return;
    var newRec = { staffId: sid, date: todayK, clockIn: ts, clockOut: null, breakStart: null, breakEnd: null, store: storeName };
    state.records.push(newRec);
    apiPost({ action: "punch", isNew: true, record: newRec });
  } else {
    if (!latest) return;
    var li = -1;
    for (var i = state.records.length - 1; i >= 0; i--) {
      var r = state.records[i];
      if (r.staffId === sid && r.date === todayK && fmt(r.clockIn) === fmt(latest.clockIn)) { li = i; break; }
    }
    if (li === -1) return;
    state.records[li][act] = ts;
    var cur = state.records[li];
    apiPost({ action: "punch", isNew: false, record: { staffId: sid, date: todayK, origClockIn: fmt(latest.clockIn), clockIn: cur.clockIn, clockOut: cur.clockOut, breakStart: cur.breakStart, breakEnd: cur.breakEnd }});
  }
  saveAll();
  var lb = { clockIn: "出勤", clockOut: "退勤", breakStart: "休憩入り", breakEnd: "休憩戻り" };
  flash((sn ? sn.name : "") + " — " + lb[act] + " " + ts);
  render();
}

// ═══════════ HTML HELPERS ═══════════
function h(tag, attrs, children) {
  var el = document.createElement(tag);
  if (attrs) {
    Object.keys(attrs).forEach(function(k) {
      if (k === "className") el.className = attrs[k];
      else if (k === "onclick" || k === "onchange" || k === "oninput") el[k] = attrs[k];
      else if (k === "style" && typeof attrs[k] === "object") Object.keys(attrs[k]).forEach(function(sk) { el.style[sk] = attrs[k][sk]; });
      else if (k === "disabled") { if (attrs[k]) el.disabled = true; }
      else if (k === "innerHTML") el.innerHTML = attrs[k];
      else el.setAttribute(k, attrs[k]);
    });
  }
  if (children !== undefined && children !== null) {
    if (typeof children === "string" || typeof children === "number") el.textContent = String(children);
    else if (Array.isArray(children)) children.forEach(function(c) { if (c) el.appendChild(c); });
    else if (children instanceof HTMLElement) el.appendChild(children);
  }
  return el;
}
function txt(s) { return document.createTextNode(s); }

// ═══════════ RENDER ═══════════
function render() {
  var stList = document.querySelector(".st-list");
  var savedScroll = stList ? stList.scrollTop : 0;
  var adminLayout = document.querySelector(".admin-layout");
  var savedAdminScroll = adminLayout ? adminLayout.scrollTop : 0;
  var root = document.getElementById("root");
  root.innerHTML = "";
  var container = h("div", { className: "root" });
  container.appendChild(h("div", { className: "bg-grid" }));
  container.appendChild(h("div", { className: "bg-glow" }));
  container.appendChild(renderHeader());
  if (state.view === "clock") container.appendChild(renderClockView());
  else container.appendChild(renderAdminView());
  if (state.showPin) container.appendChild(renderPinModal());
  if (state.showCal && state.sel) container.appendChild(renderCalModal());
  if (state.toast) container.appendChild(renderToast());
  root.appendChild(container);
  // スクロール位置復元（RAF で確実にレイアウト後に実行）
  requestAnimationFrame(function() {
    var newStList = document.querySelector(".st-list");
    if (newStList && savedScroll > 0) newStList.scrollTop = savedScroll;
    var newAdminLayout = document.querySelector(".admin-layout");
    if (newAdminLayout && savedAdminScroll > 0) newAdminLayout.scrollTop = savedAdminScroll;
  });
}

function exportMonthlySummaryCSV(summary, yr, mo) {
  var BOM = "\uFEFF";
  var header = "名前,店舗,形態,出勤日数,総実働(分),給与,交通費,合計\n";
  var rows = summary.map(function(s) {
    return s.name + "," + s.store + "," + (s.type === "hour" ? "時給" : "月給") + "," + s.days + "," + s.totalMin + "," + s.salary + "," + s.transport + "," + s.total;
  });
  var b = new Blob([BOM + header + rows.join("\n")], { type: "text/csv;charset=utf-8;" });
  var url = URL.createObjectURL(b);
  var a = document.createElement("a"); a.href = url; a.download = "toichi_月次集計_" + yr + "-" + String(mo).padStart(2,"0") + ".csv";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function() { URL.revokeObjectURL(url); }, 5000);
  flash("月次集計CSVをダウンロードしました");
}

  card.appendChild(salRow);

  // カレンダーテーブル
  var tbl = h("table", { className: "cal" });
  var thead = h("tr");
  ["日", "曜", "出勤", "退勤", "休憩", "実働"].forEach(function(t) { thead.appendChild(h("th", null, t)); });
  tbl.appendChild(thead);

  var daysInMonth = new Date(yr, mo, 0).getDate();
  var todayK = toK(now());
  for (var d = 1; d <= daysInMonth; d++) {
    var dateStr = yr + "-" + String(mo).padStart(2, "0") + "-" + String(d).padStart(2, "0");
    var dt = new Date(yr, mo - 1, d);

    var dayRecs = moRecs.filter(function(r) { return r.date === dateStr; });
    var isToday = dateStr === todayK;
    var hol = isHoliday(dateStr);
    var holName = getHolidayName(dateStr);
    var dowClass = (hol || dt.getDay() === 0) ? "cal-sun" : dt.getDay() === 6 ? "cal-sat" : "";
    var dowLabel = dayOfWeek + (holName ? " " + holName : "");

    if (dayRecs.length === 0) {
      var tr = h("tr");
      tr.appendChild(h("td", { className: isToday ? "cal-today" : "" }, d));
      tr.appendChild(h("td", { className: dowClass }, dowLabel));
      tr.appendChild(h("td", null, "-")); tr.appendChild(h("td", null, "-")); tr.appendChild(h("td", null, "-")); tr.appendChild(h("td", null, "-"));

        var brk = diffMin(r.breakStart, r.breakEnd);
        tr.appendChild(h("td", null, brk > 0 ? brk + "分" : "-"));
        var work = (r.clockIn && r.clockOut) ? diffMin(r.clockIn, r.clockOut) - brk : 0;
        tr.appendChild(h("td", { style: { color: "#22d3ee" } }, work > 0 ? hm(work) : "-"));
        tbl.appendChild(tr);
      });
    }
  }
  card.appendChild(tbl);

  // CSV出力
  card.appendChild(h("div", { style: { marginTop: "12px", textAlign: "center" } }, [
    h("button", { className: "btn btn-p", onclick: function() { exportCSV(sn, moRecs, yr, mo); } }, "📊 CSV出力")

      var thead = h("tr");
      ["出勤", "退勤", "休憩入", "休憩戻", "操作"].forEach(function(t) { thead.appendChild(h("th", null, t)); });
      tbl.appendChild(thead);
      recs.forEach(function(r) {
        var tr = h("tr");

        btnWrap.appendChild(h("button", { className: "btn btn-s", onclick: function() { state.editRec = JSON.parse(JSON.stringify(r)); state.editRec._isNew = false; state.editRec._origClockIn = r.clockIn; render(); } }, "編集"));

  ]));

  var net = totalWork - totalBrk;
  var salary = 0, transportTotal = 0;
  moRecs.forEach(function(r) { if (r.clockIn && r.clockOut) { var w = diffMin(r.clockIn, r.clockOut) - diffMin(r.breakStart, r.breakEnd); var rate = isHolidayOrWeekend(r.date) ? (sn.rateH || sn.rate || 0) : (sn.rate || 0); salary += Math.round(w / 60 * rate); transportTotal += (sn.transport || 0); } });
  var summary = h("div", { className: "cal-summary" });

    var salRow = h("div", { className: "cal-salary" });

    salRow.appendChild(h("div", { className: "sal-card" }, [h("div", { className: "sal-v" }, "¥" + transportTotal.toLocaleString()), h("div", { className: "sal-l" }, "交通費")]));
    salRow.appendChild(h("div", { className: "sal-card" }, [h("div", { className: "sal-v" }, "¥" + (salary + transportTotal).toLocaleString()), h("div", { className: "sal-l" }, "合計")]));
    modal.appendChild(salRow);
  }
  var tbl = h("table", { className: "cal" });
  var thead = h("tr");
  ["日", "曜", "出勤", "退勤", "休憩", "実働"].forEach(function(t) { thead.appendChild(h("th", null, t)); });
  tbl.appendChild(thead);
  var daysInMonth = new Date(yr, mo, 0).getDate();
  for (var d = 1; d <= daysInMonth; d++) {
    var dateStr = yr + "-" + String(mo).padStart(2, "0") + "-" + String(d).padStart(2, "0");

      tr.appendChild(h("td", null, "-")); tr.appendChild(h("td", null, "-")); tr.appendChild(h("td", null, "-")); tr.appendChild(h("td", null, "-"));
      tbl.appendChild(tr);
    } else {
      dayRecs.forEach(function(r, ri) {
        var tr = h("tr");
        tr.appendChild(h("td", { className: isToday ? "cal-today" : "" }, ri === 0 ? d : ""));

        tr.appendChild(h("td", null, fmt(r.clockIn)));
        tr.appendChild(h("td", null, fmt(r.clockOut)));
        var brk = diffMin(r.breakStart, r.breakEnd);
        tr.appendChild(h("td", null, brk > 0 ? brk + "分" : "-"));
        var work = (r.clockIn && r.clockOut) ? diffMin(r.clockIn, r.clockOut) - brk : 0;

    h("button", { className: "btn btn-s", style: { marginLeft: "12px" }, onclick: function() { state.showCal = false; render(); } }, "閉じる")
  ]));

// ═══════════ ACTIONS ═══════════
function addStaffFn() {
  if (!state.newName.trim()) { flash("名前を入力してください", "err"); return; }
  if (state.stores.length === 0) { flash("先に店舗を追加してください", "err"); return; }
  if (!state.newStore || state.stores.indexOf(state.newStore) === -1) state.newStore = state.stores[0];
  var newStaff = { id: "s" + Date.now(), name: state.newName.trim(), store: state.newStore, type: state.newType, rate: parseInt(state.newRate) || 0, rateH: parseInt(state.newRateH) || 0, transport: parseInt(state.newTransport) || 0 };
  state.staff.push(newStaff);
  apiPost({ action: "addStaff", staff: newStaff }, function() { setTimeout(function() { syncFromServer(false); }, 2000); });
  flash(state.newName.trim() + "さんを追加しました");
  state.newName = ""; state.newTransport = "0";
  saveAll(); render();
}
function saveStaffEditFn() {
  if (!state.editStaff) return;
  state.staff = state.staff.map(function(s) { return s.id === state.editStaff.id ? state.editStaff : s; });
  apiPost({ action: "updateStaff", staff: state.editStaff }, function() { setTimeout(function() { syncFromServer(false); }, 2000); });
  state.editStaff = null;
  flash("スタッフ情報を更新しました");
  saveAll(); render();
}
function confirmDeleteFn() {
  if (!state.confirmDel) return;
  var s = state.staff.find(function(x) { return x.id === state.confirmDel; });
  apiPost({ action: "deleteStaff", staffId: state.confirmDel }, function() { setTimeout(function() { syncFromServer(false); }, 2000); });
  state.staff = state.staff.filter(function(x) { return x.id !== state.confirmDel; });
  state.records = state.records.filter(function(x) { return x.staffId !== state.confirmDel; });
  flash((s ? s.name : "") + "さんを削除しました");
  state.confirmDel = null;
  saveAll(); render();
}
function renderConfirmDelRecModal() {
  var r = state.confirmDelRec;
  var sn = state.staff.find(function(x) { return x.id === r.staffId; });
  var bg = h("div", { className: "modal-bg", onclick: function(e) { if (e.target === bg) { state.confirmDelRec = null; render(); } } });
  var modal = h("div", { className: "modal" });
  modal.appendChild(h("div", { className: "modal-title" }, "打刻削除の確認"));
  modal.appendChild(h("div", { style: { color: "#94a3b8", marginBottom: "20px", lineHeight: "1.8" } }, [
    txt((sn ? sn.name : "") + "さんの打刻記録を削除しますか？"),
    h("br"),
    txt("日付: " + r.date + "　出勤: " + fmt(r.clockIn) + "　退勤: " + fmt(r.clockOut))
  ]));
  var btnRow = h("div", { style: { display: "flex", gap: "12px" } });
  btnRow.appendChild(h("button", { className: "modal-cancel", onclick: function() { state.confirmDelRec = null; render(); } }, "キャンセル"));
  btnRow.appendChild(h("button", { className: "modal-del", onclick: function() { deleteRecord(r); } }, "削除する"));
  modal.appendChild(btnRow);
  bg.appendChild(modal);
  return bg;
}
function deleteRecord(rec) {
  // ローカルから削除
  var found = false;
  state.records = state.records.filter(function(r) {
    if (!found && r.staffId === rec.staffId && r.date === rec.date && fmt(r.clockIn) === fmt(rec.clockIn)) { found = true; return false; }
    return true;
  });
  // GASから削除
  apiPost({ action: "deleteRecord", record: { staffId: rec.staffId, date: rec.date, clockIn: fmt(rec.clockIn) } }, function() { setTimeout(function() { syncFromServer(false); }, 2000); });
  state.confirmDelRec = null;
  flash("打刻を削除しました");
  saveAll(); render();
}
function saveEdit() {
  if (!state.editRec) return;
  var rec = state.editRec;
  var clean = {};
  Object.keys(rec).forEach(function(k) { if (k !== "_isNew" && k !== "_origClockIn") clean[k] = rec[k]; });
  if (rec._isNew) {
    if (!clean.clockIn) { flash("出勤時刻を入力してください", "err"); return; }
    state.records.push(clean);
    apiPost({ action: "punch", isNew: true, record: { staffId: clean.staffId, date: clean.date, clockIn: clean.clockIn, clockOut: clean.clockOut, breakStart: clean.breakStart, breakEnd: clean.breakEnd, store: clean.store || "" } }, function() { setTimeout(function() { syncFromServer(false); }, 2000); });
  } else {
    var found = false;
    state.records = state.records.map(function(r) {
      if (!found && r.staffId === clean.staffId && r.date === clean.date && fmt(r.clockIn) === fmt(rec._origClockIn)) { found = true; return clean; }
      return r;
    });
    // origClockInをHH:MM形式で送信（GAS側もHH:MMで比較するので形式が一致する）
    apiPost({ action: "punch", isNew: false, record: { staffId: clean.staffId, date: clean.date, origClockIn: fmt(rec._origClockIn), clockIn: clean.clockIn, clockOut: clean.clockOut, breakStart: clean.breakStart, breakEnd: clean.breakEnd } }, function() { setTimeout(function() { syncFromServer(false); }, 2000); });
  }
  state.editRec = null;
  flash("打刻を保存しました");
  saveAll(); render();
}
function addStore() {
  if (!state.newStoreName.trim()) return;
  state.stores.push(state.newStoreName.trim());
  apiPost({ action: "addStore", storeName: state.newStoreName.trim() }, function() { setTimeout(function() { syncFromServer(false); }, 2000); });
  state.newStoreName = "";
  flash("店舗を追加しました");
  saveAll(); render();
}
function saveStoreEdit() {
  if (state.editStoreIdx === null || !state.editStoreName.trim()) return;
  var old = state.stores[state.editStoreIdx];
  var newName = state.editStoreName.trim();
  state.stores[state.editStoreIdx] = newName;
  state.staff = state.staff.map(function(s) { return s.store === old ? Object.assign({}, s, { store: newName }) : s; });
  apiPost({ action: "updateStore", oldName: old, newName: newName }, function() { setTimeout(function() { syncFromServer(false); }, 2000); });
  state.editStoreIdx = null;
  flash("店舗名を変更しました");
  saveAll(); render();
}
function deleteStore(idx) {
  var name = state.stores[idx];
  if (state.staff.some(function(s) { return s.store === name; })) { flash("この店舗にスタッフがいるため削除できません", "err"); return; }
  state.stores = state.stores.filter(function(_, i) { return i !== idx; });
  apiPost({ action: "deleteStore", storeName: name }, function() { setTimeout(function() { syncFromServer(false); }, 2000); });
  flash("店舗を削除しました");
  saveAll(); render();
}
function exportCSV(sn, moRecs, yr, mo) {
  var BOM = "\uFEFF";
  var header = "日付,曜日,出勤,退勤,休憩(分),実働(分),備考\n";
  var rows = [];
  var daysInMonth = new Date(yr, mo, 0).getDate();
  for (var d = 1; d <= daysInMonth; d++) {
    var dateStr = yr + "-" + String(mo).padStart(2,"0") + "-" + String(d).padStart(2,"0");
    var dt = new Date(dateStr);
    var dayOfWeek = ["日","月","火","水","木","金","土"][dt.getDay()];
    var dayRecs = moRecs.filter(function(r) { return r.date === dateStr; });
    if (dayRecs.length === 0) { rows.push(dateStr + "," + dayOfWeek + ",,,,,"); }
    else { dayRecs.forEach(function(r) { var brk = diffMin(r.breakStart, r.breakEnd); var work = (r.clockIn && r.clockOut) ? diffMin(r.clockIn, r.clockOut) - brk : 0; rows.push(dateStr + "," + dayOfWeek + "," + fmt(r.clockIn) + "," + fmt(r.clockOut) + "," + brk + "," + work + ","); }); }
  }
  var b = new Blob([BOM + header + rows.join("\n")], { type: "text/csv;charset=utf-8;" });
  var url = URL.createObjectURL(b);
  var a = document.createElement("a"); a.href = url; a.download = "toichi_勤怠_" + sn.name + "_" + state.month + ".csv";
  if (typeof a.download !== "undefined") { document.body.appendChild(a); a.click(); document.body.removeChild(a); }
  else { window.open(url); }
  setTimeout(function() { URL.revokeObjectURL(url); }, 5000);
  flash("CSVをダウンロードしました");
}

// ═══════════ INIT ═══════════
render();
setInterval(function() {
  if (state.view !== "clock") return;
  var n = now();
  var timeH = String(n.getHours()).padStart(2,"0") + ":" + String(n.getMinutes()).padStart(2,"0");
  var timeS = String(n.getSeconds()).padStart(2,"0");
  var bigT = document.querySelector(".big-t");
  var bigS = document.querySelector(".big-s");
  if (bigT) bigT.textContent = timeH;
  if (bigS) bigS.textContent = timeS;
}, 1000);
syncFromServer(false);
setInterval(function() { syncFromServer(false); }, SYNC_INTERVAL);
</script>
