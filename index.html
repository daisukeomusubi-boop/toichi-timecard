<script>
// ═══════════════════════════════════════════════════════════════
// （株）toichi タイムカード v6 — オフライン版（外部CDN不要）
// ═══════════════════════════════════════════════════════════════

var DEFAULT_STORES = ["橿原本店", "北堀江店", "心斎橋toichibowl"];
var ADMIN_PIN = "0910";
var SK = { staff: "toichi_s5", records: "toichi_r5", stores: "toichi_stores5" };

function load(k, fb) { try { var d = localStorage.getItem(k); return d ? JSON.parse(d) : fb; } catch(e) { return fb; } }
function save(k, d) { try { localStorage.setItem(k, JSON.stringify(d)); } catch(e) { console.warn("LS save failed:", e); } }
if (!Array.prototype.findLastIndex) { Array.prototype.findLastIndex = function(fn) { for (var i = this.length - 1; i >= 0; i--) { if (fn(this[i], i, this)) return i; } return -1; }; }
function now() { return new Date(); }
function pad(n) { return String(n).padStart(2, "0"); }
function fmt(d) { if (!d) return "--:--"; var t = new Date(d); return pad(t.getHours()) + ":" + pad(t.getMinutes()); }
function fmtS(d) { if (!d) return "00"; return pad(new Date(d).getSeconds()); }
function toK(d) { var t = new Date(d); return t.getFullYear() + "-" + pad(t.getMonth() + 1) + "-" + pad(t.getDate()); }
function dwName(d) { return ["日","月","火","水","木","金","土"][new Date(d).getDay()]; }
function fmtJP(d) { var t = new Date(d); return t.getFullYear() + "年" + (t.getMonth() + 1) + "月" + t.getDate() + "日 (" + dwName(d) + ")"; }
function SH(s) { return s && s.length > 6 ? s.slice(0, 4) : s; }
function cMin(r) {
  if (!r.clockIn || !r.clockOut) return 0;
  var t = (new Date(r.clockOut) - new Date(r.clockIn)) / 60000;
  var b = r.breakStart && r.breakEnd ? (new Date(r.breakEnd) - new Date(r.breakStart)) / 60000 : 0;
  return Math.max(0, Math.round(t - b));
}
function hm(m) { return Math.floor(m / 60) + ":" + pad(m % 60); }
function hmL(m) { return Math.floor(m / 60) + "時間" + pad(m % 60) + "分"; }

// ═══════════ HELPERS ═══════════
function getStoreStaff() { return state.staff.filter(function(s) { return s.store === state.store; }); }
function getDayRecs(sid, dateKey) { dateKey = dateKey || toK(now()); return state.records.filter(function(r) { return r.staffId === sid && r.date === dateKey; }); }
function getRec(sid) { var rs = getDayRecs(sid); return rs.length > 0 ? rs[rs.length - 1] : null; }
function getSt(sid) {
  var r = getRec(sid);
  if (!r) return { l: "未出勤", c: "#64748b", k: "none" };
  if (r.clockOut) return { l: "退勤済", c: "#475569", k: "done" };
  if (r.breakStart && !r.breakEnd) return { l: "休憩中", c: "#f59e0b", k: "break" };
  return { l: "出勤中", c: "#22d3ee", k: "working" };
}
function punch(sid, act) {
  var ts = new Date().toISOString();
  var todayK = toK(now());
  var dayRecs = state.records.filter(function(r) { return r.staffId === sid && r.date === todayK; });
  var latest = dayRecs.length > 0 ? dayRecs[dayRecs.length - 1] : null;
  if (act === "clockIn") {
    if (latest && !latest.clockOut) return;
    state.records.push({ staffId: sid, date: todayK, clockIn: ts, clockOut: null, breakStart: null, breakEnd: null });
  } else {
    if (!latest) return;
    var li = -1;
    for (var i = state.records.length - 1; i >= 0; i--) {
      var r = state.records[i];
      if (r.staffId === sid && r.date === todayK && r.clockIn === latest.clockIn) { li = i; break; }
    }
    if (li === -1) return;
    state.records[li][act] = ts;
  }
  saveAll();
  var lb = { clockIn: "出勤", clockOut: "退勤", breakStart: "休憩入り", breakEnd: "休憩戻り" };
  var sn = state.staff.find(function(x) { return x.id === sid; });
  flash((sn ? sn.name : "") + " — " + lb[act] + " " + fmt(ts));
}

// ═══════════ HTML HELPERS ═══════════
function h(tag, attrs, children) {
  var el = document.createElement(tag);
  if (attrs) {
    // type属性は他の属性より先に設定（inputの挙動に影響するため）
    if (attrs.type) el.setAttribute("type", attrs.type);
    Object.keys(attrs).forEach(function(k) {
      if (k === "type") return; // 既に設定済み
      if (k === "className") el.className = attrs[k];
      else if (k === "onclick" || k === "onchange" || k === "oninput") el[k] = attrs[k];
      else if (k === "style" && typeof attrs[k] === "object") {
        Object.keys(attrs[k]).forEach(function(sk) { el.style[sk] = attrs[k][sk]; });
      }
      else if (k === "disabled") { if (attrs[k]) el.disabled = true; }
      else if (k === "innerHTML") el.innerHTML = attrs[k];
      else if (k === "value") {
        // input/textareaはDOM propertyで設定（カーソル位置を保持）
        // selectはoptionのselected属性で制御するのでスキップ
        if (tag === "input" || tag === "textarea") el.value = attrs[k];
      }
      else el.setAttribute(k, attrs[k]);
    });
  }
  if (children !== undefined && children !== null) {
    if (typeof children === "string" || typeof children === "number") el.textContent = String(children);
    else if (Array.isArray(children)) children.forEach(function(c) { if (c) el.appendChild(c); });
    else if (children instanceof HTMLElement) el.appendChild(children);
  }
  return el;
}
function txt(s) { return document.createTextNode(s); }

// ═══════════ RENDER ═══════════
function render() {
  var root = document.getElementById("root");
  root.innerHTML = "";
  var container = h("div", { className: "root" });
  container.appendChild(h("div", { className: "bg-grid" }));
  container.appendChild(h("div", { className: "bg-glow" }));
  container.appendChild(renderHeader());
  if (state.view === "clock") container.appendChild(renderClockView());
  else container.appendChild(renderAdminView());
  if (state.showPin) container.appendChild(renderPinModal());
  if (state.showCal && state.sel) container.appendChild(renderCalModal());
  if (state.toast) container.appendChild(renderToast());
  root.appendChild(container);
}

// ═══════════ CALENDAR PERSONAL (shared) ═══════════
function renderCalendarPersonal(staffId, showSalary, onEditRecord, yrKey, moKey, selDayKey) {
  var yr = state[yrKey];
  var mo = state[moKey];
  var mk = yr + "-" + pad(mo + 1);
  var mrs = state.records.filter(function(r) { return r.staffId === staffId && r.date.indexOf(mk) === 0; });
  var recsByDate = {};
  mrs.forEach(function(r) { if (!recsByDate[r.date]) recsByDate[r.date] = []; recsByDate[r.date].push(r); });
  var firstDay = new Date(yr, mo, 1).getDay();
  var daysIn = new Date(yr, mo + 1, 0).getDate();
  var totalMin = mrs.reduce(function(s, r) { return s + cMin(r); }, 0);
  var uniqueDays = countUniqueDays(mrs);
  var weekdayMin = mrs.filter(function(r) { return !isHolWE(r.date); }).reduce(function(s, r) { return s + cMin(r); }, 0);
  var holidayMin = mrs.filter(function(r) { return isHolWE(r.date); }).reduce(function(s, r) { return s + cMin(r); }, 0);
  var sd = state.staff.find(function(x) { return x.id === staffId; }) || {};

  var wrap = h("div");
  // nav
  var nav = h("div", { className: "cal-nav" });
  nav.appendChild(h("button", { className: "cal-arrow", onclick: function() { if (mo === 0) { state[yrKey] = yr - 1; state[moKey] = 11; } else state[moKey] = mo - 1; state[selDayKey] = null; render(); } }, "◀"));
  nav.appendChild(h("span", { className: "cal-month" }, yr + "年" + (mo + 1) + "月"));
  nav.appendChild(h("button", { className: "cal-arrow", onclick: function() { if (mo === 11) { state[yrKey] = yr + 1; state[moKey] = 0; } else state[moKey] = mo + 1; state[selDayKey] = null; render(); } }, "▶"));
  wrap.appendChild(nav);
  // summary
  var sum = h("div", { className: "cal-summary" });
  sum.innerHTML = "出勤 <strong class='cyan'>" + uniqueDays + "日</strong>&nbsp;&nbsp;総時間 <strong class='cyan'>" + hmL(totalMin) + "</strong>&nbsp;&nbsp;平日 <strong style='color:#38bdf8'>" + hmL(weekdayMin) + "</strong>&nbsp;&nbsp;土日祝 <strong style='color:#f59e0b'>" + hmL(holidayMin) + "</strong>";
  wrap.appendChild(sum);
  // salary
  if (showSalary && sd.type === "hourly") {
    var wdSalary = Math.round((sd.rate || 0) * weekdayMin / 60);
    var hdSalary = Math.round((sd.rateH || 0) * holidayMin / 60);
    var totalSalary = wdSalary + hdSalary;
    var totalTransport = (sd.transport || 0) * uniqueDays;
    var sal = h("div", { className: "cal-salary" });
    sal.innerHTML = "平日給与 <strong style='color:#38bdf8'>¥" + wdSalary.toLocaleString() + "</strong>&nbsp;&nbsp;土日祝給与 <strong style='color:#f59e0b'>¥" + hdSalary.toLocaleString() + "</strong>&nbsp;&nbsp;総時給計 <strong class='cyan'>¥" + totalSalary.toLocaleString() + "</strong>&nbsp;&nbsp;交通費計 <strong style='color:#fbbf24'>¥" + totalTransport.toLocaleString() + "</strong>&nbsp;&nbsp;総合計 <strong style='color:#4ade80'>¥" + (totalSalary + totalTransport).toLocaleString() + "</strong>";
    wrap.appendChild(sal);
  }
  // grid
  var grid = h("div", { className: "cal-grid" });
  ["日","月","火","水","木","金","土"].forEach(function(d) {
    grid.appendChild(h("div", { className: "cal-hd" + (d === "日" ? " sun" : d === "土" ? " sat" : "") }, d));
  });
  for (var i = 0; i < firstDay; i++) grid.appendChild(h("div", { className: "cal-cell empty" }));
  for (var d = 1; d <= daysIn; d++) {
    (function(day) {
      var dk = yr + "-" + pad(mo + 1) + "-" + pad(day);
      var dayW = new Date(yr, mo, day).getDay();
      var hol = isHoliday(dk);
      var recs = recsByDate[dk] || [];
      var isToday = dk === toK(now());
      var isSel = state[selDayKey] === dk;
      var totalDayMin = recs.reduce(function(s, r) { return s + cMin(r); }, 0);
      var cell = h("div", {
        className: "cal-cell" + (recs.length ? " has" : "") + (isToday ? " today" : "") + (isSel ? " cal-sel" : ""),
        onclick: function() { state[selDayKey] = isSel ? null : dk; render(); }
      });
      cell.appendChild(h("div", { className: "cal-d" + (dayW === 0 || hol ? " sun" : dayW === 6 ? " sat" : "") }, String(day)));
      if (recs.length > 0) {
        var info = h("div", { className: "cal-info" });
        recs.forEach(function(r) {
          var shift = h("div", { className: "cal-shift" });
          shift.appendChild(h("span", { className: "cal-time" }, fmt(r.clockIn)));
          shift.appendChild(h("span", { className: "cal-sep" }, "~"));
          shift.appendChild(h("span", { className: "cal-time" }, fmt(r.clockOut)));
          info.appendChild(shift);
        });
        if (totalDayMin > 0) info.appendChild(h("div", { className: "cal-dur" }, hm(totalDayMin)));
        cell.appendChild(info);
      } else {
        cell.appendChild(h("div", { className: "cal-off" }, "—"));
      }
      grid.appendChild(cell);
    })(d);
  }
  wrap.appendChild(grid);
  // day detail
  var selDay = state[selDayKey];
  if (selDay) {
    var selDayRecs = recsByDate[selDay] || [];
    var selDayTotal = selDayRecs.reduce(function(s, r) { return s + cMin(r); }, 0);
    var detail = h("div", { className: "day-detail fade-up" });
    var hdr = h("div", { className: "day-detail-hd" });
    hdr.appendChild(h("span", { style: { fontWeight: "700", color: "#e2e8f0", fontSize: "15px" } }, selDay.slice(5).replace("-", "/") + " (" + dwName(selDay) + ")" + (isHoliday(selDay) ? " 🔴祝日" : "")));
    hdr.appendChild(h("button", { style: { background: "none", border: "1px solid #334155", borderRadius: "6px", color: "#64748b", padding: "2px 8px", fontSize: "14px", cursor: "pointer" }, onclick: function() { state[selDayKey] = null; render(); } }, "✕"));
    detail.appendChild(hdr);
    if (selDayRecs.length === 0) {
      detail.appendChild(h("div", { style: { color: "#64748b", fontSize: "13px", padding: "12px 0" } }, "この日の打刻記録はありません"));
    } else {
      selDayRecs.forEach(function(r, i) {
        var m = cMin(r);

    var f4 = h("div", { style: { marginBottom: "12px" } }); f4.appendChild(h("label", { className: "field-label" }, "平日時給")); f4.appendChild(h("input", { type: "number", value: es.rate || "", className: "field", oninput: function(e) { state.editStaff.rate = parseInt(e.target.value) || 0; } })); modal.appendChild(f4);
    var f5 = h("div", { style: { marginBottom: "12px" } }); f5.appendChild(h("label", { className: "field-label" }, "土日祝時給")); f5.appendChild(h("input", { type: "number", value: es.rateH || "", className: "field", oninput: function(e) { state.editStaff.rateH = parseInt(e.target.value) || 0; } })); modal.appendChild(f5);
  }
  var f6 = h("div", { style: { marginBottom: "12px" } }); f6.appendChild(h("label", { className: "field-label" }, "交通費/日")); f6.appendChild(h("input", { type: "number", value: es.transport || "", className: "field", oninput: function(e) { state.editStaff.transport = parseInt(e.target.value) || 0; } })); modal.appendChild(f6);
  var btns = h("div", { style: { display: "flex", gap: "8px", marginTop: "16px" } });
  btns.appendChild(h("button", { className: "modal-cancel", onclick: function() { state.editStaff = null; render(); } }, "キャンセル"));
  btns.appendChild(h("button", { className: "modal-save", onclick: function() { saveStaffEditFn(); } }, "保存"));
  modal.appendChild(btns);
  ov.appendChild(modal);
  return ov;
}

function renderConfirmDelModal() {
  var s = state.staff.find(function(x) { return x.id === state.confirmDel; });
  var ov = h("div", { className: "overlay", onclick: function() { state.confirmDel = null; render(); } });
  var modal = h("div", { className: "modal", style: { maxWidth: "340px", textAlign: "center" }, onclick: function(e) { e.stopPropagation(); } });
  modal.appendChild(h("div", { className: "modal-title", style: { textAlign: "center" } }, "⚠ スタッフ削除"));
  var p1 = h("p", { style: { color: "#94a3b8", fontSize: "14px", marginBottom: "8px" } });
  p1.appendChild(h("strong", { style: { color: "#e2e8f0" } }, s ? s.name : ""));
  p1.appendChild(txt("さんを削除しますか？"));
  modal.appendChild(p1);
  modal.appendChild(h("p", { style: { color: "#f87171", fontSize: "12px", marginBottom: "20px" } }, "関連する打刻記録もすべて削除されます"));
  var btns = h("div", { style: { display: "flex", gap: "8px" } });
  btns.appendChild(h("button", { className: "modal-cancel", onclick: function() { state.confirmDel = null; render(); } }, "キャンセル"));
  btns.appendChild(h("button", { className: "modal-del", onclick: confirmDeleteFn }, "削除する"));
  modal.appendChild(btns);
  ov.appendChild(modal);
  return ov;
}

function renderPinModal() {
  var ov = h("div", { className: "overlay", onclick: function() { state.showPin = false; render(); } });
  var modal = h("div", { className: "modal", style: { maxWidth: "320px", textAlign: "center" }, onclick: function(e) { e.stopPropagation(); } });
  modal.appendChild(h("div", { className: "modal-title", style: { textAlign: "center" } }, "🔒 管理者PIN"));
  modal.appendChild(h("p", { style: { color: "#64748b", fontSize: "13px", marginBottom: "16px" } }, "4桁のPINコードを入力"));
  var dots = h("div", { style: { display: "flex", justifyContent: "center", gap: "8px", marginBottom: "20px" } });
  for (var i = 0; i < 4; i++) {
    dots.appendChild(h("div", { className: "pin-dot", style: { borderColor: state.pin.length > i ? "#0ea5e9" : "#334155" } }, state.pin[i] ? "●" : ""));
  }
  modal.appendChild(dots);
  var pad = h("div", { className: "pin-pad" });
  [1, 2, 3, 4, 5, 6, 7, 8, 9, "", 0, "⌫"].forEach(function(n) {
    if (n === "") { pad.appendChild(h("div")); return; }
    pad.appendChild(h("button", { className: "pin-key", onclick: function() {
      if (n === "⌫") { state.pin = state.pin.slice(0, -1); render(); return; }
      var nx = state.pin + String(n);
      if (nx.length <= 4) state.pin = nx;
      if (nx.length === 4) {
        if (nx === ADMIN_PIN) { state.authed = true; state.view = "admin"; state.showPin = false; state.pin = ""; flash("管理画面にログインしました"); }
        else { flash("PINが正しくありません", "err"); state.pin = ""; }
      }
      render();
    } }, String(n)));
  });
  modal.appendChild(pad);
  modal.appendChild(h("button", { className: "pin-cancel", onclick: function() { state.showPin = false; render(); } }, "キャンセル"));
  ov.appendChild(modal);
  return ov;
}

function renderToast() {
  var t = state.toast;
  var el = h("div", { className: "toast " + (t.t === "err" ? "toast-err" : "toast-ok") });
  el.appendChild(h("div", { className: "toast-ic" }, t.t === "err" ? "✕" : "✓"));
  el.appendChild(txt(t.m));
  return el;
}

// ═══════════ ACTIONS ═══════════
function addStaffFn() {
  if (!state.newName.trim()) { flash("名前を入力してください", "err"); return; }
  if (state.stores.length === 0) { flash("先に店舗を追加してください", "err"); return; }
  if (!state.newStore || state.stores.indexOf(state.newStore) === -1) state.newStore = state.stores[0];
  state.staff.push({ id: "s" + Date.now(), name: state.newName.trim(), store: state.newStore, type: state.newType, rate: parseInt(state.newRate) || 0, rateH: parseInt(state.newRateH) || 0, transport: parseInt(state.newTransport) || 0 });
  flash(state.newName.trim() + "さんを追加しました");
  state.newName = ""; state.newTransport = "0";
  saveAll(); render();
}
function confirmDeleteFn() {
  if (!state.confirmDel) return;
  var s = state.staff.find(function(x) { return x.id === state.confirmDel; });
  state.staff = state.staff.filter(function(x) { return x.id !== state.confirmDel; });
  state.records = state.records.filter(function(x) { return x.staffId !== state.confirmDel; });
  flash((s ? s.name : "") + "さんを削除しました");
  state.confirmDel = null;
  saveAll(); render();
}
function saveStaffEditFn() {
  if (!state.editStaff) return;
  state.staff = state.staff.map(function(s) { return s.id === state.editStaff.id ? state.editStaff : s; });
  state.editStaff = null;
  flash("スタッフ情報を更新しました");
  saveAll(); render();
}
function saveEdit() {
  if (!state.editRec) return;
  var rec = state.editRec;
  var clean = {};
  Object.keys(rec).forEach(function(k) { if (k !== "_isNew" && k !== "_origClockIn") clean[k] = rec[k]; });
  if (rec._isNew) {
    if (!clean.clockIn) { flash("出勤時刻を入力してください", "err"); return; }
    state.records.push(clean);
  } else {
    var found = false;
    state.records = state.records.map(function(r) {
      if (!found && r.staffId === clean.staffId && r.date === clean.date && r.clockIn === rec._origClockIn) { found = true; return clean; }
      return r;
    });
  }
  state.editRec = null;
  flash("打刻を保存しました");
  saveAll(); render();
}
function exportCSV() {
  var BOM = "\uFEFF";
  var header = "スタッフ名,店舗,雇用形態,日付,曜日,出勤,退勤,休憩開始,休憩終了,労働時間(分),労働時間,交通費\n";
  var rows = [];
  state.staff.forEach(function(s) {
    var mrs = state.records.filter(function(r) { return r.staffId === s.id && r.date.indexOf(state.month) === 0; });
    mrs.forEach(function(r) {
      var m = cMin(r);
      rows.push([s.name, s.store, s.type === "hourly" ? "時給" : "月給", r.date, dwName(r.date), fmt(r.clockIn), fmt(r.clockOut), fmt(r.breakStart), fmt(r.breakEnd), m, hmL(m), s.transport || 0].join(","));
    });
  });
  var b = new Blob([BOM + header + rows.join("\n")], { type: "text/csv;charset=utf-8;" });
  var url = URL.createObjectURL(b);
  // iPad Safariでは a.click() が動かない場合があるのでwindow.openでフォールバック
  var a = document.createElement("a"); a.href = url; a.download = "toichi_勤怠_" + state.month + ".csv";
  if (typeof a.download !== "undefined") { document.body.appendChild(a); a.click(); document.body.removeChild(a); }
  else { window.open(url); }
  setTimeout(function() { URL.revokeObjectURL(url); }, 5000);
  flash("CSVをダウンロードしました");
}
function addStore() {
  if (!state.newStoreName.trim()) return;
  state.stores.push(state.newStoreName.trim());
  state.newStoreName = "";
  flash("店舗を追加しました");
  saveAll(); render();
}
function saveStoreEdit() {
  if (state.editStoreIdx === null || !state.editStoreName.trim()) return;
  var old = state.stores[state.editStoreIdx];
  state.stores[state.editStoreIdx] = state.editStoreName.trim();
  state.staff = state.staff.map(function(s) { return s.store === old ? Object.assign({}, s, { store: state.editStoreName.trim() }) : s; });
  state.editStoreIdx = null;
  flash("店舗名を変更しました");
  saveAll(); render();
}
function deleteStore(idx) {
  var name = state.stores[idx];
  if (state.staff.some(function(s) { return s.store === name; })) { flash("この店舗にスタッフがいるため削除できません", "err"); return; }
  state.stores = state.stores.filter(function(_, i) { return i !== idx; });
  flash("店舗を削除しました");
  saveAll(); render();
}

// ═══════════ INIT ═══════════
render();
// 時計は差分更新のみ（全DOM再構築しない）→ 管理画面でのフォーカス消失を防止
setInterval(function() {
  if (state.view === "clock") {
    var bigT = document.querySelector(".big-t");
    var bigS = document.querySelector(".big-s");
    var dateL = document.querySelector(".date-l");
    var clk = now();
    if (bigT) bigT.textContent = fmt(clk.toISOString());
    if (bigS) bigS.textContent = fmtS(clk.toISOString());
    if (dateL) dateL.textContent = fmtJP(clk);
  }
}, 1000);
</script>
